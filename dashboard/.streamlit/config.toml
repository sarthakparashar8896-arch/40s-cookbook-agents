[theme]
primaryColor       = "#C0392B"
backgroundColor    = "#FFFFFF"
secondaryBackgroundColor = "#FDF6F0"
textColor          = "#1A1A1A"
font               = "sans serif"

[server]
maxUploadSize        = 10
headless             = true
maxMessageSize       = 200
fileWatcherType      = "none"
enableStaticServing  = false

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
